// ── Google Maps routing (optional; falls back to OSRM without a key) ──────
// Set a key by opening the app once with ?gkey=YOUR_KEY (stored locally),
// or hardcode it in GOOGLE_KEY_DEFAULT for all users of this deployment.
const GOOGLE_KEY_DEFAULT='AIzaSyCvWXQ0H05kiWBaQmQACXQJ3_ciHNufFJU';
const GOOGLE_KEY=(()=>{try{
  const q=new URLSearchParams(location.search);
  const k=q.get('gkey');
  if(k){
    localStorage.setItem('fn_gmaps_key',k);
    q.delete('gkey');
    history.replaceState(null,'',location.pathname+(q.toString()?'?'+q.toString():''));
  }
  return localStorage.getItem('fn_gmaps_key')||GOOGLE_KEY_DEFAULT;
}catch(e){return GOOGLE_KEY_DEFAULT;}})();

let gmapsLoader=null;
function loadGoogle(){
  if(!GOOGLE_KEY)return Promise.resolve(null);
  if(window.google?.maps?.DirectionsService)return Promise.resolve(window.google);
  if(!gmapsLoader)gmapsLoader=new Promise(res=>{
    const sc=document.createElement('script');
    sc.src=`https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(GOOGLE_KEY)}&language=no&region=NO`;
    sc.onload=()=>res(window.google?.maps?.DirectionsService?window.google:null);
    sc.onerror=()=>res(null);
    document.head.appendChild(sc);
  });
  return gmapsLoader;
}

// Convert a Google DirectionsRoute to the internal (OSRM-shaped) format
function convertGoogleRoute(rt){
  const legs=rt.legs.map(leg=>({
    summary:rt.summary||'',
    steps:(leg.steps||[]).map(st=>({
      mode:(st.maneuver==='ferry'||/ferge|ferje|ferry/i.test(st.instructions||''))?'ferry':'driving',
      duration:st.duration?.value||0,
      distance:st.distance?.value||0,
      geometry:{coordinates:(st.path||[]).map(ll=>[ll.lng(),ll.lat()])}
    }))
  }));
  return{
    duration:rt.legs.reduce((s2,l)=>s2+(l.duration?.value||0),0),
    distance:rt.legs.reduce((s2,l)=>s2+(l.distance?.value||0),0),
    geometry:{coordinates:(rt.overview_path||[]).map(ll=>[ll.lng(),ll.lat()])},
    legs
  };
}

async function googleRoutes(points,opts){
  const g=await loadGoogle();
  if(!g)return null;
  const svc=new g.maps.DirectionsService();
  const req={
    origin:{lat:points[0].lat,lng:points[0].lon},
    destination:{lat:points[points.length-1].lat,lng:points[points.length-1].lon},
    waypoints:points.slice(1,-1).map(p=>({location:{lat:p.lat,lng:p.lon},stopover:false})),
    travelMode:g.maps.TravelMode?g.maps.TravelMode.DRIVING:'DRIVING',
    provideRouteAlternatives:!!(opts&&opts.alternatives),
    avoidFerries:!!(opts&&opts.avoidFerries),
    region:'no'
  };
  const res=await new Promise(resolve=>{
    try{svc.route(req,(r,status)=>resolve(status==='OK'?r:null));}catch(e){resolve(null);}
  });
  return res?res.routes.map(convertGoogleRoute):null;
}

// Retry transient network/server errors with backoff — mobile networks flake
async function fetchRetry(url,opts,tries){
  tries=tries||3;
  let lastErr;
  for(let i=0;i<tries;i++){
    try{
      const r=await fetch(url,opts);
      if(r.ok||r.status<500)return r;
      lastErr=new Error('HTTP '+r.status);
    }catch(e){lastErr=e;}
    if(i<tries-1)await new Promise(res=>setTimeout(res,500*(i+1)));
  }
  throw lastErr;
}

// ── helpers ────────────────────────────────────────────────────────────────
function pad(n){return(n<10?'0':'')+n;}
function fmt(m){m=((Math.round(m)%1440)+1440)%1440;return pad(Math.floor(m/60))+':'+pad(m%60);}
function durFmt(m){m=Math.round(m);const hh=Math.floor(m/60),mm=m%60;return hh&&mm?hh+'h '+mm+'m':hh?hh+'h':mm+'m';}
function gen(a,b,s){const r=[];for(let t=a;t<=b;t+=s)r.push(t);return r;}
function latestDep(deps,lim){let r=deps[0];for(const d of deps)if(d<=lim)r=d;return r;}
function earliestDep(deps,min){for(const d of deps)if(d>=min)return d;return deps[deps.length-1];}

function haversineKm(a,b){
  const R=6371,rad=x=>x*Math.PI/180;
  const dLat=rad(b[0]-a[0]),dLon=rad(b[1]-a[1]);
  const h=Math.sin(dLat/2)**2+Math.cos(rad(a[0]))*Math.cos(rad(b[0]))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}

function nowMinutes(){
  const p=new Intl.DateTimeFormat('en',{timeZone:'Europe/Oslo',hour:'numeric',minute:'numeric',hour12:false}).formatToParts(new Date());
  let hh=parseInt(p.find(x=>x.type==='hour').value,10);
  if(hh===24)hh=0;
  return hh*60+parseInt(p.find(x=>x.type==='minute').value,10);
}

function todayOslo(){return new Intl.DateTimeFormat('en-CA',{timeZone:'Europe/Oslo'}).format(new Date());}

function buildShareUrl({from,to,via,date,mode,timeMin,margin,vehicle}){
  const p=new URLSearchParams();
  p.set('fra',from.name);p.set('fra_p',from.lat.toFixed(5)+','+from.lon.toFixed(5));
  p.set('til',to.name);p.set('til_p',to.lat.toFixed(5)+','+to.lon.toFixed(5));
  if(via){p.set('via',via.name);p.set('via_p',via.lat.toFixed(5)+','+via.lon.toFixed(5));}
  p.set('dato',date);p.set('modus',mode);p.set('tid',String(timeMin));p.set('buffer',String(margin));
  if(vehicle&&vehicle!=='car')p.set('kjt',vehicle);
  return location.origin+location.pathname+'?'+p.toString();
}

function parseShareUrl(){
  const q=new URLSearchParams(location.search);
  const fp=(q.get('fra_p')||'').split(','),tp=(q.get('til_p')||'').split(',');
  if(!q.get('fra')||!q.get('til')||fp.length!==2||tp.length!==2)return null;
  const from={name:q.get('fra'),lat:+fp[0],lon:+fp[1]};
  const to={name:q.get('til'),lat:+tp[0],lon:+tp[1]};
  if([from.lat,from.lon,to.lat,to.lon].some(isNaN))return null;
  let via=null;
  const vp=(q.get('via_p')||'').split(',');
  if(q.get('via')&&vp.length===2&&!isNaN(+vp[0])&&!isNaN(+vp[1]))via={name:q.get('via'),lat:+vp[0],lon:+vp[1]};
  const mg=parseInt(q.get('buffer'),10);
  return{from,to,via,
    date:/^\d{4}-\d{2}-\d{2}$/.test(q.get('dato')||'')?q.get('dato'):todayOslo(),
    mode:q.get('modus')==='leave'?'leave':'arrive',
    timeMin:Math.min(1410,Math.max(0,parseInt(q.get('tid'),10)||1080)),
    vehicle:['ev','mc','long'].includes(q.get('kjt'))?q.get('kjt'):'car',
    margin:isNaN(mg)?DEF_MARGIN:Math.min(45,Math.max(-5,mg))};
}

// Minutes from midnight of baseDate (Oslo time); departures on later days
// come back as >1440 so schedules keep working across midnight
function isoToMin(iso,baseDate){
  try{
    const d=new Date(iso);
    const p=new Intl.DateTimeFormat('en',{timeZone:'Europe/Oslo',hour:'numeric',minute:'numeric',hour12:false}).formatToParts(d);
    let hh=parseInt(p.find(x=>x.type==='hour').value,10);
    if(hh===24)hh=0;
    const mm=parseInt(p.find(x=>x.type==='minute').value,10);
    if(isNaN(hh)||isNaN(mm))return null;
    let off=0;
    if(baseDate){
      const dayStr=new Intl.DateTimeFormat('en-CA',{timeZone:'Europe/Oslo'}).format(d);
      off=Math.round((Date.parse(dayStr)-Date.parse(baseDate))/86400000);
    }
    return off*1440+hh*60+mm;
  }catch(e){return null;}
}

// ── API ────────────────────────────────────────────────────────────────────
async function searchPlaces(text){
  const r=await fetch(`https://api.entur.io/geocoder/v1/autocomplete?text=${encodeURIComponent(text)}&lang=no&size=8`,{headers:{'ET-Client-Name':'ferrynav-app'}});
  const d=await r.json();
  return(d.features||[]).map(f=>({name:f.properties.label||f.properties.name,lat:f.geometry.coordinates[1],lon:f.geometry.coordinates[0],id:f.properties.id}));
}

async function searchQuays(text){
  const r=await fetch(`https://api.entur.io/geocoder/v1/autocomplete?text=${encodeURIComponent(text)}&lang=no&size=10&layers=venue`,{headers:{'ET-Client-Name':'ferrynav-app'}});
  const d=await r.json();
  return(d.features||[]).filter(f=>f.properties.id?.startsWith('NSR:')&&(
    (f.properties.category||[]).join(' ').toLowerCase().includes('ferry')||
    /ferje|ferge|kai|hurtigb/i.test(f.properties.name||'')
  )).map(f=>({name:f.properties.label||f.properties.name,id:f.properties.id,lat:f.geometry.coordinates[1],lon:f.geometry.coordinates[0]}));
}

// Ferry quays in the bounding box between the endpoints (Entur geocoder)
async function ferryQuaysInBox(a,b){
  try{
    const minLat=Math.min(a.lat,b.lat)-0.15,maxLat=Math.max(a.lat,b.lat)+0.15;
    const minLon=Math.min(a.lon,b.lon)-0.3,maxLon=Math.max(a.lon,b.lon)+0.3;
    const box=`&boundary.rect.min_lat=${minLat}&boundary.rect.max_lat=${maxLat}&boundary.rect.min_lon=${minLon}&boundary.rect.max_lon=${maxLon}`;
    const seen=new Set(),out=[];
    // both spellings: "ferjekai" (nynorsk regions) and "fergekai" (bokmål)
    for(const word of['ferjekai','fergekai']){
      const r=await fetchRetry(`https://api.entur.io/geocoder/v1/autocomplete?text=${word}&size=40&layers=venue`+box,{headers:{'ET-Client-Name':'ferrynav-app'}});
      const d=await r.json();
      for(const f of(d.features||[])){
        if(!f.properties.id?.startsWith('NSR:')||seen.has(f.properties.id))continue;
        seen.add(f.properties.id);
        out.push({name:f.properties.name,lat:f.geometry.coordinates[1],lon:f.geometry.coordinates[0]});
      }
    }
    return out;
  }catch(e){return[];}
}

async function fetchOSRM(points,params){
  try{
    const cs=points.map(p=>p.lon+','+p.lat).join(';');
    const r=await fetchRetry(`https://router.project-osrm.org/route/v1/driving/${cs}?steps=true&geometries=geojson&overview=full&`+params);
    const d=await r.json();
    return d.code==='Ok'?(d.routes||[]):[];
  }catch(e){return [];}
}

async function routeOSRM(points){
  // Up to 3 OSRM alternatives, plus explicit ferry-free / toll-free /
  // motorway-free probes — every distinct, realistic option becomes a choice.
  // OSRM only supports alternatives for two-point requests, so via routes get one.
  const hasVia=points.length>2;
  const [main,noFerry,noToll,noMotorway]=await Promise.all([
    fetchOSRM(points,hasVia?'':'alternatives=3'),
    fetchOSRM(points,'exclude=ferry'),
    fetchOSRM(points,'exclude=toll'),
    fetchOSRM(points,'exclude=motorway')
  ]);
  let routes=main.length?main.slice():(hasVia?[]:await fetchOSRM(points,'alternatives=true'));
  if(!routes.length){
    for(const p of[noFerry,noToll,noMotorway])if(p.length){routes=[p[0]];break;}
  }
  if(!routes.length)throw new Error('NOROUTE');
  const dup=(a,b)=>Math.abs(a.duration-b.duration)<180&&Math.abs(a.distance-b.distance)<3000;
  const best=routes[0].duration;
  const consider=[...noFerry.filter(r=>!r.legs.some(l=>l.steps.some(st=>st.mode==='ferry'))),...noToll,...noMotorway];
  for(const extra of consider){
    if(extra.duration>best*1.75)continue; // far slower than the fastest — not a realistic choice
    if(routes.some(r=>dup(r,extra)))continue;
    routes.push(extra);
  }
  await addQuayDetours(points,routes,pts=>fetchOSRM(pts,''));
  return routes.slice(0,6);
}

// Quay-aware detour probing: routers rarely propose ferry-heavy parallel
// corridors on their own. Find real ferry quays between the endpoints that
// lie well off the main route, and probe explicit routes via them —
// e.g. Koparnes forces the coastal Rv61 corridor from Ålesund.
async function addQuayDetours(points,routes,probe){
  if(points.length>2||!(routes[0]?.geometry?.coordinates?.length>2))return;
  const a=points[0],b=points[points.length-1];
  const g=routes[0].geometry.coordinates;
  const best=routes[0].duration;
  const step=Math.max(1,Math.floor(g.length/60));
  const sample=[];for(let i=0;i<g.length;i+=step)sample.push(g[i]);
  const deg=(p,q)=>{const dx=(p[0]-q.lon)*Math.cos(q.lat*Math.PI/180),dy=p[1]-q.lat;return Math.hypot(dx,dy);};
  const distToRoute=q=>Math.min(...sample.map(c=>deg(c,q)));
  const dAB=deg([a.lon,a.lat],b)||1e-6;
  const quays=await ferryQuaysInBox(a,b);
  const cands=quays
    .map(q=>({q,off:distToRoute(q),detour:(deg([a.lon,a.lat],q)+deg([b.lon,b.lat],q))/dAB}))
    .filter(x=>x.off>8/111)      // well off the main route
    .filter(x=>x.detour<1.5)     // still plausibly "between" the endpoints
    .sort((x,y)=>x.detour-y.detour);
  const picked=[];
  for(const c of cands){
    if(picked.some(p=>deg([p.q.lon,p.q.lat],c.q)<12/111))continue;
    picked.push(c);
    if(picked.length>=4)break;
  }
  const detours=await Promise.all(picked.map(c=>probe([a,c.q,b]).catch(()=>[])));
  const dupLoose=x=>routes.some(r=>
    Math.abs(r.duration-x.duration)<Math.max(600,best*0.08)&&
    Math.abs(r.distance-x.distance)<Math.max(8000,routes[0].distance*0.08));
  const extras=detours.flat().filter(x=>x&&x.duration<=best*1.75).sort((x,y)=>x.duration-y.duration);
  for(const extra of extras){
    if(dupLoose(extra))continue;
    routes.push(extra);
  }
}

// Google-based route finding: Google's own alternatives usually include
// ferry corridors; ferry-free and quay probes fill in the rest
async function googleFind(points){
  const hasVia=points.length>2;
  const [main,noFerry]=await Promise.all([
    googleRoutes(points,{alternatives:!hasVia}),
    googleRoutes(points,{avoidFerries:true})
  ]);
  let routes=(main||[]).slice();
  if(!routes.length&&noFerry?.length)routes=[noFerry[0]];
  if(!routes.length)throw new Error('NOROUTE');
  const dup=(x,y)=>Math.abs(x.duration-y.duration)<180&&Math.abs(x.distance-y.distance)<3000;
  const best=routes[0].duration;
  for(const nf of(noFerry||[])){
    if(nf.legs.some(l=>l.steps.some(st=>st.mode==='ferry')))continue;
    if(nf.duration>best*1.75)continue;
    if(routes.some(r=>dup(r,nf)))continue;
    routes.push(nf);
  }
  await addQuayDetours(points,routes,pts=>googleRoutes(pts,{}).then(r=>r||[]));
  return routes.slice(0,6);
}

// Route source orchestrator: Google when a key is configured, OSRM otherwise
async function findRoutes(points){
  if(GOOGLE_KEY&&await loadGoogle()){
    try{return await googleFind(points);}catch(e){if(e.message==='NOROUTE')throw e;}
  }
  return routeOSRM(points);
}

async function findFerryStop(lat,lon,name){
  try{
    const r=await fetchRetry(`https://api.entur.io/geocoder/v1/reverse?point.lat=${lat}&point.lon=${lon}&size=10&layers=venue&boundary.circle.radius=3`,{headers:{'ET-Client-Name':'ferrynav-app'}});
    const d=await r.json();
    const f=(d.features||[]).find(f=>f.properties.id?.startsWith('NSR:')&&(
      (f.properties.category||[]).join(' ').toLowerCase().includes('ferry')||
      ['ferje','ferge','kai'].some(w=>f.properties.name?.toLowerCase().includes(w))
    ));
    if(f)return{name:f.properties.name,id:f.properties.id,lat:f.geometry.coordinates[1],lon:f.geometry.coordinates[0]};
  }catch(e){}
  if(name){
    try{
      const term=name.split(/[-–]/)[0].trim()+' ferjekai';
      const r=await fetch(`https://api.entur.io/geocoder/v1/autocomplete?text=${encodeURIComponent(term)}&lang=no&size=5&layers=venue`,{headers:{'ET-Client-Name':'ferrynav-app'}});
      const d=await r.json();
      const f=(d.features||[]).find(f=>f.properties.id?.startsWith('NSR:'));
      if(f)return{name:f.properties.name,id:f.properties.id,lat:f.geometry.coordinates[1],lon:f.geometry.coordinates[0]};
    }catch(e){}
  }
  return null;
}

async function getFerryDeps(stopId,dateStr){
  // 48h window from the travel date so schedules work past midnight;
  // cancellation flags and service disruptions (situations) come along
  const q=`{stopPlace(id:"${stopId}"){situations{summary{value language}}estimatedCalls(startTime:"${dateStr}T00:00:00+02:00" timeRange:172800 numberOfDepartures:200 whiteListedModes:[water]){expectedDepartureTime cancellation}}}`;
  const r=await fetchRetry('https://api.entur.io/journey-planner/v3/graphql',{method:'POST',headers:{'Content-Type':'application/json','ET-Client-Name':'ferrynav-app'},body:JSON.stringify({query:q})});
  const{data}=await r.json();
  const sp=data?.stopPlace;
  const deps=(sp?.estimatedCalls||[]).map(c=>({t:isoToMin(c.expectedDepartureTime,dateStr),cancelled:!!c.cancellation}))
    .filter(x=>x.t!==null&&x.t>=0).sort((a,b)=>a.t-b.t);
  const alerts=[...new Set((sp?.situations||[]).map(s=>{
    const sm=s.summary||[];
    const no=sm.find(x=>x.language==='no'||x.language==='nob')||sm[0];
    return no?.value||'';
  }).filter(Boolean))];
  return{deps,alerts};
}

// Live ferry positions from Entur's realtime vehicles API (open, no key)
async function fetchVessels(b){
  try{
    const q=`{vehicles(boundingBox:{minLat:${b.minLat},minLon:${b.minLon},maxLat:${b.maxLat},maxLon:${b.maxLon}}){vehicleId mode lastUpdated location{latitude longitude} line{lineRef}}}`;
    const r=await fetch('https://api.entur.io/realtime/v2/vehicles/graphql',{method:'POST',headers:{'Content-Type':'application/json','ET-Client-Name':'ferrynav-app'},body:JSON.stringify({query:q})});
    const d=await r.json();
    return(d?.data?.vehicles||[]).filter(v=>v?.location&&/water|ferry/i.test(String(v.mode||'')));
  }catch(e){return[];}
}

// Bounding box around a route's ferry crossings, padded
function ferryBBox(steps){
  const lats=[],lons=[];
  (steps||[]).forEach(st=>{
    if(st.mode!=='ferry'||!st.geometry?.coordinates?.length)return;
    st.geometry.coordinates.forEach(c=>{lats.push(c[1]);lons.push(c[0]);});
  });
  if(!lats.length)return null;
  return{minLat:Math.min(...lats)-0.03,maxLat:Math.max(...lats)+0.03,
         minLon:Math.min(...lons)-0.05,maxLon:Math.max(...lons)+0.05};
}

// Estimated AutoPASS car fare from crossing length (linear fit against
// published fares, e.g. Lavik–Oppedal ~5.6km→~172, Moss–Horten ~10km→~260).
// Vehicle multipliers approximate the fare-group ratios in the regulativ.
const VEHICLES={car:1,ev:0.5,mc:0.5,long:1.8};
function ferryFare(km,veh){
  const mult=VEHICLES[veh]||1;
  return Math.max(Math.round(80*mult),Math.round((60+km*20)*mult));
}

async function reverseAddress(lat,lon){
  try{
    const r=await fetchRetry(`https://api.entur.io/geocoder/v1/reverse?point.lat=${lat}&point.lon=${lon}&size=1&layers=address`,{headers:{'ET-Client-Name':'ferrynav-app'}});
    const d=await r.json();
    return d.features?.[0]?.properties?.label||null;
  }catch(e){return null;}
}

// ── route planner ──────────────────────────────────────────────────────────
function shortStop(n){return n?n.replace(/\s*(ferjekai|fergekai|ferjeleie|fergeleie|kai)\s*$/i,'').trim():null;}

async function planOneRoute(osrmRoute,{from,to,via,date,timeMin,mode,margin,lang,vehicle}){
  const S=STR[lang]||STR.no;
  const allSteps=osrmRoute.legs.flatMap(l=>l.steps);

  // Build drive/ferry segments from OSRM steps
  const segs=[];
  let ds=0,dm=0;
  for(const step of allSteps){
    if(step.mode==='ferry'){
      segs.push({type:'drive',dur:Math.round(ds/60),km:Math.round(dm/1000)});
      ds=0;dm=0;
      const coords=step.geometry?.coordinates||[];
      segs.push({type:'ferry',dur:Math.max(Math.round(step.duration/60),5),osrmName:step.name||'',
        km:(step.distance||0)/1000,
        fromCoords:coords.length?{lat:coords[0][1],lon:coords[0][0]}:{lat:from.lat,lon:from.lon},
        toCoords:coords.length>1?{lat:coords[coords.length-1][1],lon:coords[coords.length-1][0]}:null});
    }else{ds+=step.duration||0;dm+=step.distance||0;}
  }
  segs.push({type:'drive',dur:Math.round(ds/60),km:Math.round(dm/1000)});

  const DRIVES=segs.filter(s=>s.type==='drive');
  const FERRY_SEGS=segs.filter(s=>s.type==='ferry');

  // Enrich ferry segments with live Entur schedules; name each crossing "A – B".
  // All crossings resolve in parallel so multi-ferry routes stay fast.
  const FERRIES=await Promise.all(FERRY_SEGS.map(async seg=>{
    const [stopA,stopB]=await Promise.all([
      findFerryStop(seg.fromCoords.lat,seg.fromCoords.lon,seg.osrmName),
      seg.toCoords?findFerryStop(seg.toCoords.lat,seg.toCoords.lon,null):Promise.resolve(null)
    ]);
    let all=[],alerts=[],isLive=false;
    if(stopA?.id){
      try{const r=await getFerryDeps(stopA.id,date);all=r.deps;alerts=r.alerts;isLive=all.length>0;}catch(e){}
    }
    if(!all.length)all=gen(360,1380,30).concat(gen(1800,2820,30)).map(t=>({t,cancelled:false}));
    const usable=all.filter(d=>!d.cancelled).map(d=>d.t);
    const a=shortStop(stopA?.name),b=shortStop(stopB?.name);
    const label=a&&b&&a!==b?a+' – '+b:(a||seg.osrmName||'Ferge');
    return{name:label,fromKai:stopA?.name,toKai:stopB?.name,stopId:stopA?.id,
      crossingMin:seg.dur,km:seg.km||0,fare:ferryFare(seg.km||0,vehicle),
      dep:usable.length?usable:all.map(d=>d.t),allDeps:all,alerts,isLive};
  }));

  // Backward scheduling for arrive-by mode
  let leaveBy;
  if(mode==='arrive'){
    let t=timeMin;
    for(let i=FERRIES.length-1;i>=0;i--){
      t-=DRIVES[i+1]?.dur||0;
      t=latestDep(FERRIES[i].dep,t-FERRIES[i].crossingMin)-margin;
    }
    leaveBy=t-(DRIVES[0]?.dur||0);
  }else{
    leaveBy=timeMin;
    // With a ferry on the route, leave home so you reach ferry #1 with
    // exactly the chosen buffer instead of waiting at the quay
    if(FERRIES.length){
      const dep1=earliestDep(FERRIES[0].dep,timeMin+(DRIVES[0]?.dur||0)+margin);
      leaveBy=Math.max(timeMin,dep1-margin-(DRIVES[0]?.dur||0));
    }
  }

  // Forward pass → steps
  let t=leaveBy;
  const steps=[];
  steps.push({type:'depart',time:t,timeColor:'var(--txt)',title:S.depart+' '+from.name,
    sub:S.drive+' '+durFmt(DRIVES[0]?.dur||0)+' · '+(DRIVES[0]?.km||0)+' km',hasSub2:false,notLast:true,ferryIdx:null});
  t+=DRIVES[0]?.dur||0;

  const boarded=[],kaiArr=[];
  for(let i=0;i<FERRIES.length;i++){
    const F=FERRIES[i],dep=earliestDep(F.dep,t+margin),buf=dep-t;
    kaiArr.push(t);
    boarded.push(dep);
    const nd=DRIVES[i+1];
    steps.push({type:'ferry',time:dep,timeColor:'var(--ferry)',title:S.ferryW+' · '+F.name,
      sub:S.quayArr+' '+fmt(t)+' · '+buf+' '+S.minBuffer+' · '+F.crossingMin+' '+S.minCrossing,
      sub2:nd?.dur?S.thenDrive+' '+durFmt(nd.dur)+' · '+nd.km+' km':'',
      hasSub2:!!(nd?.dur),notLast:true,ferryIdx:i,alert:F.alerts[0]||null});
    t=dep+F.crossingMin+(nd?.dur||0);
  }
  const arrive=t;
  steps.push({type:'arrive',time:arrive,timeColor:ACC,title:S.arriveT+' '+to.name,sub:S.done,hasSub2:false,notLast:false,ferryIdx:null});

  const ferryCost=FERRIES.reduce((s,f)=>s+f.fare,0);
  const totalKm=DRIVES.reduce((s,d)=>s+(d.km||0),0);
  return{leaveBy,arrive,total:arrive-leaveBy,distance:totalKm,numFerries:FERRIES.length,
    cost:ferryCost,costBreak:FERRIES.length?S.fareEst:S.withoutFerry,
    isFerry:FERRIES.length>0,boarded,kaiArr,drives:DRIVES,steps,ferries:FERRIES,osrmRoute,osrmSteps:allSteps,from,to,
    viaPoint:via||null,
    reqLeave:mode==='leave'?timeMin:null,
    via:osrmRoute.legs?.[0]?.summary||'',
    isLive:FERRIES.some(f=>f.isLive)};
}

// Plan every OSRM alternative (ferry route vs. driving around etc.)
async function planAlternatives(opts){
  const points=[opts.from,...(opts.via?[opts.via]:[]),opts.to];
  const routes=await findRoutes(points);
  const settled=await Promise.allSettled(routes.map(rt=>planOneRoute(rt,opts)));
  const out=settled.filter(s=>s.status==='fulfilled').map(s=>s.value);
  if(!out.length)throw new Error('NOROUTE');
  // Fastest real-world option first (incl. ferry waiting); drop routes
  // that take far longer than the best — not real choices
  out.sort((a,b)=>a.total-b.total);
  const bestTotal=out[0].total;
  return out.filter(r=>r.total<=bestTotal*1.4);
}

// For every first-ferry departure today: leave home so you just catch it,
// chain the rest forward, and compare totals — connections that align give
// the day's fastest crossings
function bestDepartures(R,margin){
  const F=R.ferries,D=R.drives;
  if(!F?.length||!D)return[];
  const out=[];
  for(const d of F[0].dep){
    if(d<240||d>=1440)continue;
    const t0=d-margin-(D[0]?.dur||0);
    let t=d+F[0].crossingMin+(D[1]?.dur||0);
    for(let i=1;i<F.length;i++){
      const dep=earliestDep(F[i].dep,t+margin);
      t=dep+F[i].crossingMin+(D[i+1]?.dur||0);
    }
    out.push({leave:t0,dep:d,arrive:t,total:t-t0});
  }
  if(!out.length)return[];
  const min=Math.min(...out.map(x=>x.total));
  return out.map(x=>({...x,best:x.total<=min+10}));
}

// Recompute leave-by/boarded/steps for a result whose ferry schedules
// were refreshed — same rules as the original plan, no API calls
function scheduleResult(R,{timeMin,mode,margin,lang}){
  const S=STR[lang]||STR.no,F=R.ferries,D=R.drives;
  if(!F?.length||!D)return R;
  const n=F.length;
  let leaveBy;
  if(mode==='arrive'){
    let t=timeMin;
    for(let i=n-1;i>=0;i--){
      t-=D[i+1]?.dur||0;
      t=latestDep(F[i].dep,t-F[i].crossingMin)-margin;
    }
    leaveBy=t-(D[0]?.dur||0);
  }else{
    const dep1=earliestDep(F[0].dep,timeMin+(D[0]?.dur||0)+margin);
    leaveBy=Math.max(timeMin,dep1-margin-(D[0]?.dur||0));
  }
  let tc=leaveBy;
  const boarded=[],kaiArr=[],steps=[];
  steps.push({type:'depart',time:tc,timeColor:'var(--txt)',title:S.depart+' '+R.from.name,
    sub:S.drive+' '+durFmt(D[0]?.dur||0)+' · '+(D[0]?.km||0)+' km',hasSub2:false,notLast:true,ferryIdx:null});
  tc+=D[0]?.dur||0;
  for(let i=0;i<n;i++){
    const dep=earliestDep(F[i].dep,tc+margin),buf=dep-tc,nd=D[i+1];
    kaiArr.push(tc);boarded.push(dep);
    steps.push({type:'ferry',time:dep,timeColor:'var(--ferry)',title:S.ferryW+' · '+F[i].name,
      sub:S.quayArr+' '+fmt(tc)+' · '+Math.max(buf,0)+' '+S.minBuffer+' · '+F[i].crossingMin+' '+S.minCrossing,
      sub2:nd?.dur?S.thenDrive+' '+durFmt(nd.dur)+' · '+nd.km+' km':'',
      hasSub2:!!(nd?.dur),notLast:true,ferryIdx:i,alert:F[i].alerts[0]||null,
      tight:buf>=0&&buf<margin?S.tightWarn(buf):null});
    tc=dep+F[i].crossingMin+(nd?.dur||0);
  }
  steps.push({type:'arrive',time:tc,timeColor:'var(--acc)',title:S.arriveT+' '+R.to.name,sub:S.done,hasSub2:false,notLast:false,ferryIdx:null});
  return{...R,leaveBy,arrive:tc,total:tc-leaveBy,boarded,kaiArr,steps,
    reqLeave:mode==='leave'?timeMin:null,isLive:F.some(f=>f.isLive)};
}

// Re-anchor the schedule on one explicitly chosen ferry departure.
// Ferry #1: the home departure time moves to match (leave-as-late-as-fits).
// Later ferries: earlier legs stay untouched — picking a departure you
// cannot reach keeps the plan but flags "you arrive X min too late".
function rescheduleResult(R,anchor,margin,S,mode){
  const F=R.ferries,D=R.drives;
  if(!F?.length||!D)return R;
  const n=F.length,ai=Math.min(anchor.ferryIdx,n-1);
  const boarded=R.boarded.slice();
  let leaveBy=R.leaveBy,lateBy=0;
  boarded[ai]=anchor.dep;
  if(ai===0){
    // never earlier than the requested departure (depart-at mode) —
    // a tighter ferry then just means less slack at the quay
    leaveBy=Math.max(R.reqLeave!=null?R.reqLeave:-1e9,anchor.dep-margin-(D[0]?.dur||0));
  }else{
    const arrKai=(R.kaiArr||[])[ai];
    if(arrKai!=null&&anchor.dep<arrKai)lateBy=arrKai-anchor.dep;
  }
  // legs after the anchored ferry roll forward
  let tf=anchor.dep+F[ai].crossingMin;
  for(let i=ai+1;i<n;i++){
    tf+=D[i]?.dur||0;
    boarded[i]=earliestDep(F[i].dep,tf+margin);
    tf=boarded[i]+F[i].crossingMin;
  }
  // rebuild steps
  let tc=leaveBy;
  const steps=[],kaiArr=[];
  steps.push({type:'depart',time:tc,timeColor:'var(--txt)',title:S.depart+' '+R.from.name,
    sub:S.drive+' '+durFmt(D[0]?.dur||0)+' · '+(D[0]?.km||0)+' km',hasSub2:false,notLast:true,ferryIdx:null});
  tc+=D[0]?.dur||0;
  for(let i=0;i<n;i++){
    const dep=boarded[i],buf=dep-tc,nd=D[i+1];
    kaiArr.push(tc);
    steps.push({type:'ferry',time:dep,timeColor:'var(--ferry)',title:S.ferryW+' · '+F[i].name,
      sub:S.quayArr+' '+fmt(tc)+' · '+Math.max(buf,0)+' '+S.minBuffer+' · '+F[i].crossingMin+' '+S.minCrossing,
      sub2:nd?.dur?S.thenDrive+' '+durFmt(nd.dur)+' · '+nd.km+' km':'',
      hasSub2:!!(nd?.dur),notLast:true,ferryIdx:i,alert:F[i].alerts[0]||null,
      warn:(i===ai&&lateBy>0)?S.lateWarn(lateBy):(buf<0?S.lateWarn(-buf):null),
      tight:buf>=0&&buf<margin?S.tightWarn(buf):null});
    tc=dep+F[i].crossingMin+(nd?.dur||0);
  }
  steps.push({type:'arrive',time:tc,timeColor:ACC,title:S.arriveT+' '+R.to.name,sub:S.done,hasSub2:false,notLast:false,ferryIdx:null});
  return{...R,leaveBy,arrive:tc,total:tc-leaveBy,boarded,kaiArr,steps};
}

// ── MapView ────────────────────────────────────────────────────────────────
function MapView({results,selIdx,selTotal,from,to,theme,onSelect}){
  const cRef=useRef(null),mRef=useRef(null);
  useEffect(()=>{
    if(!cRef.current||!window.L)return;
    if(mRef.current){mRef.current.remove();mRef.current=null;}
    const dk=theme!=='light';
    const mAcc=dk?'#2BD9D0':'#0A9C93',mFer=dk?'#37C2F0':'#0E86C4',mGrey=dk?'#4a5763':'#9FB0C0';
    const map=L.map(cRef.current,{zoomControl:false,attributionControl:false});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/'+(dk?'dark_all':'light_all')+'/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19}).addTo(map);
    const bounds=L.latLngBounds();
    // Unselected alternatives first: dim grey, tap to switch
    results.forEach((R,i)=>{
      if(i===selIdx||!R.osrmRoute?.geometry)return;
      const pl=L.polyline(R.osrmRoute.geometry.coordinates.map(c=>[c[1],c[0]]),{color:mGrey,weight:5,opacity:.75}).addTo(map);
      pl.on('click',()=>onSelect(i));
      bounds.extend(pl.getBounds());
    });
    // Selected route on top, colored per step
    const sel=results[selIdx];
    if(sel?.osrmSteps?.length){
      for(const step of sel.osrmSteps){
        if(!step.geometry?.coordinates?.length)continue;
        const coords=step.geometry.coordinates.map(c=>[c[1],c[0]]);
        const ferry=step.mode==='ferry';
        const pl=L.polyline(coords,{color:ferry?mFer:mAcc,weight:ferry?3:4,dashArray:ferry?'8 5':null,opacity:.95}).addTo(map);
        bounds.extend(pl.getBounds());
      }
    }else if(sel?.osrmRoute?.geometry){
      const pl=L.polyline(sel.osrmRoute.geometry.coordinates.map(c=>[c[1],c[0]]),{color:mAcc,weight:4,opacity:.9}).addTo(map);
      bounds.extend(pl.getBounds());
    }
    // Time badge per alternative — tap to select. Badges slide along their
    // route until they stop overlapping each other.
    const span=(typeof bounds.getNorth==='function'&&bounds.isValid())
      ?Math.hypot(bounds.getNorth()-bounds.getSouth(),bounds.getEast()-bounds.getWest()):1;
    const placedBadges=[];
    results.forEach((R,i)=>{
      const g=R.osrmRoute?.geometry?.coordinates;
      if(!g?.length)return;
      let pt=null;
      for(const f of[0.5,0.42,0.58,0.34,0.66,0.26,0.74,0.18,0.82]){
        const c=g[Math.min(g.length-1,Math.floor(g.length*f))];
        if(placedBadges.every(p=>Math.hypot(p[0]-c[1],p[1]-c[0])>span*0.09)){pt=c;break;}
      }
      if(!pt)pt=g[Math.floor(g.length/2)];
      placedBadges.push([pt[1],pt[0]]);
      const seld=i===selIdx;
      // Selected badge shows the derived total so picking another ferry
      // departure updates the time on the map too
      const tot=seld&&selTotal!=null?selTotal:R.total;
      const icon=L.divIcon({className:'',iconSize:null,iconAnchor:[26,13],
        html:`<div style="padding:4px 10px;border-radius:20px;font:700 11px 'JetBrains Mono',monospace;white-space:nowrap;background:${seld?mAcc:'var(--glass3)'};color:${seld?'var(--onacc)':'var(--txt)'};border:1px solid ${seld?mAcc:'var(--dim)'};box-shadow:0 2px 8px rgba(0,0,0,.35);">${durFmt(tot)}${R.numFerries?' ⛴':''}</div>`});
      const lm=L.marker([pt[1],pt[0]],{icon}).addTo(map);
      lm.on('click',()=>onSelect(i));
    });
    const mk=(fill,border)=>L.divIcon({html:`<div style="width:13px;height:13px;border-radius:50%;background:${fill};border:3px solid ${border};box-sizing:border-box;"></div>`,className:'',iconSize:[13,13],iconAnchor:[6,6]});
    if(from){L.marker([from.lat,from.lon],{icon:mk('var(--bg)',ACC)}).addTo(map);bounds.extend([from.lat,from.lon]);}
    const viaPoint=results[selIdx]?.viaPoint;
    if(viaPoint){L.marker([viaPoint.lat,viaPoint.lon],{icon:mk('var(--amber)','var(--amber)')}).addTo(map);bounds.extend([viaPoint.lat,viaPoint.lon]);}
    if(to){L.marker([to.lat,to.lon],{icon:mk(ACC,ACC)}).addTo(map);bounds.extend([to.lat,to.lon]);}
    if(bounds.isValid())map.fitBounds(bounds,{padding:[28,28]});
    // live ferry vessels on the selected route's crossings
    let vessels=[],vTimer=null;
    const bbox=ferryBBox(sel?.osrmSteps);
    if(bbox){
      const draw=async()=>{
        const vs=await fetchVessels(bbox);
        if(!mRef.current)return;
        vessels.forEach(mk2=>{try{map.removeLayer(mk2);}catch(e){}});
        vessels=vs.map(v=>L.marker([v.location.latitude,v.location.longitude],{zIndexOffset:900,
          icon:L.divIcon({className:'',iconSize:[22,22],iconAnchor:[11,11],
            html:`<div data-vessel style="width:22px;height:22px;border-radius:50%;background:${mFer};display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4);">⛴</div>`})}).addTo(map));
      };
      draw();
      vTimer=setInterval(draw,20000);
    }
    mRef.current=map;
    return()=>{if(vTimer)clearInterval(vTimer);if(mRef.current){mRef.current.remove();mRef.current=null;}};
  },[results,selIdx,selTotal,from,to,theme]);
  return h('div',{ref:cRef,style:{width:'100%',height:'100%'}});
}

// ── DataBadge ──────────────────────────────────────────────────────────────
function DataBadge({src}){
  const s={fontSize:9,fontWeight:700,letterSpacing:'.08em',padding:'2px 5px',borderRadius:4};
  if(src==='live')return h('span',{style:{...s,color:ACC,background:'rgba(43,217,208,.15)'}},'LIVE');
  if(src==='loading')return h('span',{style:{...s,color:MUT,background:PANEL}},'···');
  return h('span',{style:{...s,color:MUT,background:PANEL}},'DEMO');
}

                // Options come from the base plan so earlier departures stay
                // pickable after choosing a later one. A couple of earlier

        ),

            R.numFerries?h('span',{style:{fontSize:13,marginLeft:7}},vehIcon+(vehOpen?' ▴':' ▾')):null),

// ── NavScreen: live navigation along the planned route ────────────────────
function NavScreen({R,now,margin,lang,T,on}){
  const [pos,setPos]=useState(null);
  const [navErr,setNavErr]=useState(null);
  const [follow,setFollow]=useState(true);
  const [rerouting,setRerouting]=useState(false);
  const cRef=useRef(null),mRef=useRef(null),meRef=useRef(null),followRef=useRef(true),pathRef=useRef(null),offCntRef=useRef(0);
  followRef.current=follow;

  // Flatten the route once: points, cumulative km, ferry leg boundaries
  if(pathRef.current&&pathRef.current.R!==R)pathRef.current=null; // rebuilt after reroute
  if(!pathRef.current){
    const pts=[],ferries=[];let fi=0;
    for(const st of R.osrmSteps||[]){
      const cs=st.geometry?.coordinates||[];
      if(st.mode==='ferry'){ferries.push({startIdx:pts.length,endIdx:pts.length+Math.max(cs.length-1,0),idx:fi});fi++;}
      for(const c of cs)pts.push([c[1],c[0]]);
    }
    const cum=[0];
    for(let i=1;i<pts.length;i++)cum.push(cum[i-1]+haversineKm(pts[i-1],pts[i]));
    pathRef.current={R,pts,cum,ferries,total:cum[cum.length-1]||0};
  }

  useEffect(()=>{
    if(!navigator.geolocation){setNavErr(T.errPosSupport);return;}
    const id=navigator.geolocation.watchPosition(
      p=>setPos({lat:p.coords.latitude,lon:p.coords.longitude,speed:p.coords.speed||0}),
      ()=>setNavErr(T.errPos),
      {enableHighAccuracy:true,maximumAge:2000,timeout:20000});
    let wl=null;
    if(navigator.wakeLock)navigator.wakeLock.request('screen').then(l=>{wl=l;}).catch(()=>{});
    return()=>{navigator.geolocation.clearWatch(id);if(wl)wl.release().catch(()=>{});};
  },[]);

  useEffect(()=>{
    if(!cRef.current||!window.L)return;
    const dk=document.documentElement.dataset.theme!=='light';
    const mAcc=dk?'#2BD9D0':'#0A9C93',mFer=dk?'#37C2F0':'#0E86C4';
    const map=L.map(cRef.current,{zoomControl:false,attributionControl:false});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/'+(dk?'dark_all':'light_all')+'/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19}).addTo(map);
    const bounds=L.latLngBounds();
    for(const st of R.osrmSteps||[]){
      if(!st.geometry?.coordinates?.length)continue;
      const coords=st.geometry.coordinates.map(c=>[c[1],c[0]]);
      const ferry=st.mode==='ferry';
      const pl=L.polyline(coords,{color:ferry?mFer:mAcc,weight:ferry?4:5,dashArray:ferry?'8 5':null,opacity:.95}).addTo(map);
      bounds.extend(pl.getBounds());
      if(ferry)L.marker(coords[0],{icon:L.divIcon({html:'<div style="width:14px;height:14px;background:var(--ferry);transform:rotate(45deg);border-radius:3px;border:2px solid var(--bg);"></div>',className:'',iconSize:[14,14],iconAnchor:[7,7]})}).addTo(map);
    }
    if(R.to)L.marker([R.to.lat,R.to.lon],{icon:L.divIcon({html:`<div style="width:15px;height:15px;border-radius:50%;background:${ACC};border:3px solid var(--bg);"></div>`,className:'',iconSize:[15,15],iconAnchor:[7,7]})}).addTo(map);
    if(bounds.isValid())map.fitBounds(bounds,{padding:[40,40]});
    // live ferry vessels on the crossings, refreshed every 20 s
    let vessels=[],vTimer=null;
    const bbox=ferryBBox(R.osrmSteps);
    if(bbox){
      const draw=async()=>{
        const vs=await fetchVessels(bbox);
        if(!mRef.current)return;
        vessels.forEach(m=>{try{map.removeLayer(m);}catch(e){}});
        vessels=vs.map(v=>L.marker([v.location.latitude,v.location.longitude],{zIndexOffset:900,
          icon:L.divIcon({className:'',iconSize:[26,26],iconAnchor:[13,13],
            html:`<div data-vessel style="width:26px;height:26px;border-radius:50%;background:${mFer};display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4);">⛴</div>`})}).addTo(map));
      };
      draw();
      vTimer=setInterval(draw,20000);
    }
    mRef.current=map;
    return()=>{if(vTimer)clearInterval(vTimer);map.remove();mRef.current=null;meRef.current=null;};
  },[R]);

  useEffect(()=>{
    if(!pos||!mRef.current||!window.L)return;
    if(!meRef.current){
      meRef.current=L.marker([pos.lat,pos.lon],{zIndexOffset:1000,icon:L.divIcon({
        html:'<div style="width:18px;height:18px;border-radius:50%;background:var(--acc);border:3px solid #fff;box-shadow:0 0 14px rgba(43,217,208,.9);"></div>',
        className:'',iconSize:[18,18],iconAnchor:[9,9]})}).addTo(mRef.current);
    }else if(meRef.current.setLatLng)meRef.current.setLatLng([pos.lat,pos.lon]);
    if(followRef.current&&mRef.current.setView)
      mRef.current.setView([pos.lat,pos.lon],Math.max(mRef.current.getZoom?mRef.current.getZoom():12,11));
  },[pos]);

  // Progress along the route
  let info=null;
  const P=pathRef.current;
  if(pos&&P.pts.length>1){
    let bi=0,bd=Infinity;
    for(let i=0;i<P.pts.length;i++){const d=haversineKm(P.pts[i],[pos.lat,pos.lon]);if(d<bd){bd=d;bi=i;}}
    const remain=Math.max(0,P.total-P.cum[bi]);
    const speed=pos.speed>2?pos.speed:16.7; // m/s; fallback 60 km/h when standing still
    const etaMin=km=>Math.round(km*1000/speed/60);
    const nextFerry=P.ferries.find(f=>f.startIdx>bi);
    const aboard=P.ferries.find(f=>bi>=f.startIdx&&bi<f.endIdx);
    info={
      offRoute:bd>0.5,
      arrived:remain<0.3&&bd<0.6,
      aboard,
      destKm:remain,destEta:now+etaMin(remain),
      speedKmh:Math.round((pos.speed||0)*3.6),
      ferry:nextFerry?{
        km:P.cum[nextFerry.startIdx]-P.cum[bi],
        eta:now+etaMin(P.cum[nextFerry.startIdx]-P.cum[bi]),
        dep:R.boarded[nextFerry.idx],
        name:R.ferries[nextFerry.idx]?.name||'',
        deps:R.ferries[nextFerry.idx]?.dep||[]
      }:null
    };
  }
  // Persistently off route → replan from the current position
  useEffect(()=>{
    if(!pos)return;
    if(!info||!info.offRoute||info.arrived||rerouting){
      if(info&&!info.offRoute)offCntRef.current=0;
      return;
    }
    offCntRef.current++;
    if(offCntRef.current<2)return; // two consecutive off-route fixes
    setRerouting(true);
    planAlternatives({from:{name:T.myLocName,lat:pos.lat,lon:pos.lon},to:R.to,via:null,
      date:todayOslo(),timeMin:nowMinutes(),mode:'leave',margin,lang})
      .then(rs=>{if(rs?.length)on('applyReroute',rs);})
      .catch(()=>{})
      .finally(()=>{setRerouting(false);offCntRef.current=0;});
  },[pos]);

  const fmtKm=km=>km<10?km.toFixed(1)+' km':Math.round(km)+' km';
  const catchOk=info?.ferry?info.ferry.eta<=info.ferry.dep:true;
  const nextDep=info?.ferry&&!catchOk?earliestDep(info.ferry.deps,info.ferry.eta):null;
  const btn={width:44,height:44,borderRadius:'50%',background:'var(--glass)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid var(--border)',cursor:'pointer',zIndex:500};

  return h('div',{style:{position:'absolute',inset:0}},
    h('div',{ref:cRef,style:{position:'absolute',inset:0}}),
    // exit
    h('div',{onClick:()=>on('exitNav'),style:{...btn,position:'absolute',left:14,top:'calc(14px + env(safe-area-inset-top))',fontSize:18}},'✕'),
    // follow toggle
    h('div',{onClick:()=>setFollow(f=>!f),style:{...btn,position:'absolute',right:14,bottom:'calc(150px + env(safe-area-inset-bottom))',fontSize:18,color:follow?ACC:MUT}},'◎'),
    // top pill: where you are heading
    h('div',{style:{position:'absolute',left:'50%',transform:'translateX(-50%)',top:'calc(14px + env(safe-area-inset-top))',padding:'9px 16px',borderRadius:24,background:'var(--glass)',backdropFilter:'blur(8px)',border:'1px solid var(--border)',fontSize:13,fontWeight:700,whiteSpace:'nowrap',zIndex:500,maxWidth:'70%',overflow:'hidden',textOverflow:'ellipsis'}},
      rerouting?T.navReroute
        :!pos?T.navGps
        :info.arrived?T.navArrived
        :info.aboard?'⛴ '+T.navAboard
        :info.ferry?'⛴ '+fmtKm(info.ferry.km)+' '+T.navFerryIn
        :'◎ '+fmtKm(info.destKm)+' '+T.navToDest),
    info?.offRoute&&!info.arrived?h('div',{style:{position:'absolute',left:'50%',transform:'translateX(-50%)',top:'calc(64px + env(safe-area-inset-top))',padding:'6px 13px',borderRadius:18,background:'rgba(237,185,59,.92)',color:'#1a1405',fontSize:12,fontWeight:700,zIndex:500,whiteSpace:'nowrap'}},T.navOffRoute):null,
    // bottom card
    h('div',{style:{position:'absolute',left:12,right:12,bottom:'calc(12px + env(safe-area-inset-bottom))',borderRadius:20,background:'var(--glass2)',backdropFilter:'blur(10px)',border:'1px solid var(--border)',padding:'14px 18px',zIndex:500}},
      navErr?h('div',{style:{color:'var(--red)',fontSize:13}},'⚠ '+navErr)
      :!pos?h('div',{style:{color:MUT,fontSize:14,textAlign:'center',padding:8}},'⟳ '+T.navGps)
      :info.arrived?h('div',{style:{textAlign:'center',padding:6}},
        h('div',{style:{fontFamily:"'Space Grotesk',sans-serif",fontSize:24,fontWeight:700,color:ACC}},T.navArrived),
        h('div',{style:{fontSize:13,color:MUT,marginTop:4}},T.navArrivedSub))
      :h('div',null,
        info.ferry?h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:8,padding:'8px 12px',borderRadius:12,background:catchOk?'rgba(43,217,208,.1)':'rgba(255,107,107,.1)',border:'1px solid '+(catchOk?'rgba(43,217,208,.4)':'rgba(255,107,107,.4)')}},
          h('span',{style:{fontSize:15}},catchOk?'✓':'✗'),
          h('div',{style:{fontSize:12.5,fontWeight:600,color:catchOk?ACC:'var(--red)',lineHeight:1.35}},
            catchOk?T.navCatch(fmt(info.ferry.dep),Math.max(0,info.ferry.dep-info.ferry.eta)):T.navMiss(fmt(info.ferry.dep),nextDep!=null?fmt(nextDep):'–'),
            h('div',{style:{color:MUT,fontWeight:500}},info.ferry.name))
        ):null,
        h('div',{style:{display:'flex',alignItems:'baseline',justifyContent:'space-between'}},
          h('div',null,
            h('span',{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:24,fontWeight:700}},fmtKm(info.destKm)),
            h('span',{style:{fontSize:12,color:MUT,marginLeft:8}},T.navToDest)),
          h('div',{style:{textAlign:'right'}},
            h('div',{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:16,fontWeight:700,color:ACC}},fmt(info.destEta)),
            h('div',{style:{fontSize:10,color:MUT}},T.navEta)),
          h('div',{style:{textAlign:'right'}},
            h('div',{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:16,fontWeight:700}},info.speedKmh),
            h('div',{style:{fontSize:10,color:MUT}},T.navKmh))
        )
      )
    )
  );
}

// ── TabBar ─────────────────────────────────────────────────────────────────
function TabBar({screen,hasResult,T,on}){
  if(screen==='nav')return null;
  const c=s=>s===screen?ACC:MUT;
  const tab=(key,icon,label,cb)=>h('div',{onClick:cb,style:{flex:1,textAlign:'center',cursor:'pointer',color:c(key)}},
    h('div',{style:{fontSize:20,lineHeight:1}},icon),
    h('div',{style:{fontSize:11,fontWeight:600,marginTop:5}},label));
  return h('div',{style:{position:'absolute',left:0,right:0,bottom:0,height:'calc(74px + env(safe-area-inset-bottom))',background:'var(--glass)',backdropFilter:'blur(12px)',borderTop:'1px solid var(--border2)',display:'flex',alignItems:'flex-start',padding:'12px 30px 0'}},
    tab('plan','◎',T.tabPlan,()=>on('tab','plan')),
    tab('nextferry','⛴',T.tabNext,()=>on('tab','nextferry')),
    hasResult&&tab('results','🗺',T.tabRoute,()=>on('tab','results')),
    hasResult&&tab('timetable','🕒',T.tabTimes,()=>on('openTT',0))
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState('plan');
  const [from,setFrom]=useState(null);
  const [to,setTo]=useState(null);
  const [fromText,setFromText]=useState('');
  const [toText,setToText]=useState('');
  const [fromSugs,setFromSugs]=useState([]);
  const [toSugs,setToSugs]=useState([]);
  const [via,setVia]=useState(null);
  const [viaText,setViaText]=useState('');
  const [viaSugs,setViaSugs]=useState([]);
  const [showVia,setShowVia]=useState(false);
  const [recents,setRecents]=useState(loadRecents);
  const [geoLoading,setGeoLoading]=useState(false);
  const [lang,setLang]=useState(()=>{try{return localStorage.getItem('fn_lang')==='en'?'en':'no';}catch(e){return 'no';}});
  const [theme,setTheme]=useState(()=>{
    try{
      const t=localStorage.getItem('fn_theme');
      if(t==='light'||t==='dark')return t;
      return window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';
    }catch(e){return 'dark';}
  });

  useEffect(()=>{document.documentElement.dataset.theme=theme;},[theme]);
  const [vehicle,setVehicle]=useState(()=>{try{const v=localStorage.getItem('fn_vehicle');return VEHICLES[v]?v:'car';}catch(e){return 'car';}});
  const [anchors,setAnchors]=useState({});
  const [nfText,setNfText]=useState('');
  const [nfSugs,setNfSugs]=useState([]);
  const [nfStop,setNfStop]=useState(null);
  const [nfDeps,setNfDeps]=useState(null);
  const [nfLoading,setNfLoading]=useState(false);
  const T=STR[lang];
  const [date,setDate]=useState(todayOslo);
  const [mode,setMode]=useState('leave');
  const [timeMin,setTimeMin]=useState(()=>Math.min(1410,Math.ceil(nowMinutes()/5)*5));
  const [margin,setMargin]=useState(DEF_MARGIN);
  const [results,setResults]=useState(null);
  const [selIdx,setSelIdx]=useState(0);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [selectedFerry,setSelectedFerry]=useState(0);
  const [now,setNow]=useState(nowMinutes);
  const [shared,setShared]=useState(false);
  const [mobile,setMobile]=useState(()=>window.matchMedia('(max-width:520px)').matches);

  useEffect(()=>{
    const mq=window.matchMedia('(max-width:520px)');
    const f=e=>setMobile(e.matches);
    mq.addEventListener('change',f);
    return()=>mq.removeEventListener('change',f);
  },[]);

  useEffect(()=>{const id=setInterval(()=>setNow(nowMinutes()),60000);return()=>clearInterval(id);},[]);

  // Silent refresh of ferry schedules every 2.5 min (and when the app
  // returns to the foreground) so cancellations reach you before the quay
  useEffect(()=>{
    if(!results)return;
    let busy=false;
    const refresh=async()=>{
      if(busy||document.hidden)return;
      busy=true;
      try{
        const stops={};
        results.forEach(R=>(R.ferries||[]).forEach(f=>{if(f.stopId)stops[f.stopId]=null;}));
        const ids=Object.keys(stops);
        if(!ids.length)return;
        await Promise.all(ids.map(async id=>{try{stops[id]=await getFerryDeps(id,date);}catch(e){}}));
        setResults(prev=>prev&&prev.map(R=>{
          let changed=false;
          const ferries=(R.ferries||[]).map(f=>{
            const r=f.stopId?stops[f.stopId]:null;
            if(!r||!r.deps.length)return f;
            changed=true;
            const usable=r.deps.filter(d=>!d.cancelled).map(d=>d.t);
            return{...f,dep:usable.length?usable:r.deps.map(d=>d.t),allDeps:r.deps,alerts:r.alerts,isLive:true};
          });
          return changed?scheduleResult({...R,ferries},{timeMin,mode,margin,lang}):R;
        }));
      }finally{busy=false;}
    };
    const id=setInterval(refresh,150000);
    const vis=()=>{if(!document.hidden)refresh();};
    document.addEventListener('visibilitychange',vis);
    return()=>{clearInterval(id);document.removeEventListener('visibilitychange',vis);};
  },[results,date,mode,timeMin,margin,lang]);

  // Open a shared link: prefill everything and plan the route immediately
  useEffect(()=>{
    const s=parseShareUrl();
    if(!s){
      // no share link: restore the last plan (works offline)
      const saved=loadPlan();
      if(saved){
        const r0=saved.results[0];
        setResults(saved.results);setSelIdx(saved.selIdx||0);
        if(r0?.from){setFrom(r0.from);setFromText(r0.from.name);}
        if(r0?.to){setTo(r0.to);setToText(r0.to.name);}
        if(saved.date)setDate(saved.date);
        if(saved.mode)setMode(saved.mode);
        if(saved.timeMin!=null)setTimeMin(saved.timeMin);
        if(saved.margin!=null)setMargin(saved.margin);
        if(saved.vehicle&&VEHICLES[saved.vehicle])setVehicle(saved.vehicle);
      }
      return;
    }
    setFrom(s.from);setTo(s.to);setFromText(s.from.name);setToText(s.to.name);
    if(s.via){setVia(s.via);setViaText(s.via.name);setShowVia(true);}
    setDate(s.date);setMode(s.mode);setTimeMin(s.timeMin);setMargin(s.margin);setVehicle(s.vehicle);
    setLoading(true);
    planAlternatives({from:s.from,to:s.to,via:s.via,date:s.date,timeMin:s.timeMin,mode:s.mode,margin:s.margin,vehicle:s.vehicle,lang:localStorage.getItem('fn_lang')==='en'?'en':'no'})
      .then(r=>{setResults(r);setSelIdx(0);setScreen('results');
        savePlan({results:r,selIdx:0,date:s.date,mode:s.mode,timeMin:s.timeMin,margin:s.margin,vehicle:s.vehicle});})
      .catch(e=>setError(e.message==='NOROUTE'?STR.no.errNoRoute:STR.no.errGeneric))
      .finally(()=>setLoading(false));
  },[]);

  useEffect(()=>{
    if(fromText.length<2||(from&&from.name===fromText)){setFromSugs([]);return;}
    const t=setTimeout(()=>searchPlaces(fromText).then(setFromSugs).catch(()=>{}),350);
    return()=>clearTimeout(t);
  },[fromText,from]);

  useEffect(()=>{
    if(toText.length<2||(to&&to.name===toText)){setToSugs([]);return;}
    const t=setTimeout(()=>searchPlaces(toText).then(setToSugs).catch(()=>{}),350);
    return()=>clearTimeout(t);
  },[toText,to]);

  useEffect(()=>{
    if(viaText.length<2||(via&&via.name===viaText)){setViaSugs([]);return;}
    const t=setTimeout(()=>searchPlaces(viaText).then(setViaSugs).catch(()=>{}),350);
    return()=>clearTimeout(t);
  },[viaText,via]);

  useEffect(()=>{
    if(nfText.length<2||(nfStop&&nfStop.name===nfText)){setNfSugs([]);return;}
    const t=setTimeout(()=>searchQuays(nfText).then(setNfSugs).catch(()=>{}),350);
    return()=>clearTimeout(t);
  },[nfText,nfStop]);

  const baseResult=results?results[selIdx]:null;
  const anchor=anchors[selIdx]||null;
  const result=baseResult&&anchor?rescheduleResult(baseResult,anchor,margin,STR[lang],mode):baseResult;

  function addRecent(f,t){
    setRecents(prev=>{
      const item={from:f,to:t,fav:false,ts:Date.now()};
      const k=recentKey(item);
      const old=prev.find(r=>recentKey(r)===k);
      if(old)item.fav=old.fav;
      let next=[item,...prev.filter(r=>recentKey(r)!==k)];
      next.sort((a,b)=>(b.fav?1:0)-(a.fav?1:0)||(b.ts||0)-(a.ts||0));
      next=[...next.filter(r=>r.fav),...next.filter(r=>!r.fav).slice(0,5)].slice(0,8);
      saveRecents(next);
      return next;
    });
  }

  function runPlan(f,t,v){
    setLoading(true);setError(null);
    planAlternatives({from:f,to:t,via:v||null,date,timeMin,mode,margin,lang,vehicle})
      .then(r=>{setResults(r);setSelIdx(0);setSelectedFerry(0);setAnchors({});
        setScreen('results');addRecent(f,t);
        savePlan({results:r,selIdx:0,date,mode,timeMin,margin,vehicle});})
      .catch(e=>setError(e.message==='NOROUTE'?T.errNoRoute:T.errGeneric))
      .finally(()=>setLoading(false));
  }

  function on(action,data){
    switch(action){
      case 'fromText': setFromText(data);setFrom(null);break;
      case 'toText': setToText(data);setTo(null);break;
      case 'selectFrom': setFrom(data);setFromText(data.name);setFromSugs([]);break;
      case 'selectTo': setTo(data);setToText(data.name);setToSugs([]);break;
      case 'viaText': setViaText(data);setVia(null);break;
      case 'selectVia': setVia(data);setViaText(data.name);setViaSugs([]);break;
      case 'addVia': setShowVia(true);break;
      case 'removeVia': setVia(null);setViaText('');setViaSugs([]);setShowVia(false);break;
      case 'myLocation':{
        if(!navigator.geolocation){setError(T.errPosSupport);break;}
        setGeoLoading(true);setError(null);
        navigator.geolocation.getCurrentPosition(async pos=>{
          const lat=pos.coords.latitude,lon=pos.coords.longitude;
          const name=(await reverseAddress(lat,lon))||'Min posisjon';
          setFrom({name,lat,lon});setFromText(name);setFromSugs([]);setGeoLoading(false);
        },()=>{setError(T.errPos);setGeoLoading(false);},
        {enableHighAccuracy:true,timeout:10000});
        break;}
      case 'recent':{
        setFrom(data.from);setFromText(data.from.name);
        setTo(data.to);setToText(data.to.name);
        setVia(null);setViaText('');setShowVia(false);
        break;}
      case 'toggleFav':{
        setRecents(prev=>{
          const k=recentKey(data);
          const next=prev.map(r=>recentKey(r)===k?{...r,fav:!r.fav}:r);
          next.sort((a,b)=>(b.fav?1:0)-(a.fav?1:0)||(b.ts||0)-(a.ts||0));
          saveRecents(next);
          return next;
        });
        break;}
      case 'swap':{const f=from,t2=to,ft=fromText,tt=toText;setFrom(t2);setTo(f);setFromText(tt);setToText(ft);setFromSugs([]);setToSugs([]);break;}
      case 'date': setDate(data);break;
      case 'setLeaveAt': setMode('leave');setTimeMin(Math.min(1410,Math.ceil(nowMinutes()/5)*5));break;
      case 'timeNow': setTimeMin(Math.min(1410,Math.ceil(nowMinutes()/5)*5));break;
      case 'setArriveBy': setMode('arrive');break;
      case 'timeSet':{
        const m2=/^(\d{1,2}):(\d{2})$/.exec(data||'');
        if(m2)setTimeMin(Math.min(1439,parseInt(m2[1],10)*60+parseInt(m2[2],10)));
        break;}
      case 'margin': setMargin(data);break;
      case 'preset': setMargin(data);break;
      case 'findRoute': runPlan(from,to,via);break;
      case 'selAlt': setSelIdx(data);setSelectedFerry(0);break;
      case 'share':{
        if(!result)break;
        const url=buildShareUrl({from:result.from,to:result.to,via:result.viaPoint,date,mode,timeMin,margin,vehicle});
        const done=()=>{setShared(true);setTimeout(()=>setShared(false),2200);};
        if(navigator.share){
          navigator.share({title:'Ferry Navigator',text:result.from.name+' → '+result.to.name,url}).then(done).catch(()=>{});
        }else if(navigator.clipboard){
          navigator.clipboard.writeText(url).then(done).catch(()=>{});
        }
        break;}
      case 'lang':{setLang(data);try{localStorage.setItem('fn_lang',data);}catch(e){}break;}
      case 'theme':{setTheme(data);try{localStorage.setItem('fn_theme',data);}catch(e){}break;}
      case 'vehicle':{setVehicle(data);try{localStorage.setItem('fn_vehicle',data);}catch(e){}break;}
      case 'pickDep': setAnchors(a=>({...a,[selIdx]:data}));break;
      case 'nfText': setNfText(data);setNfStop(null);break;
      case 'nfSelect':{
        setNfStop(data);setNfText(data.name);setNfSugs([]);setNfLoading(true);setNfDeps(null);
        getFerryDeps(data.id,todayOslo())
          .then(r=>setNfDeps(r))
          .catch(()=>setNfDeps({deps:[],alerts:[]}))
          .finally(()=>setNfLoading(false));
        break;}
      case 'nfClear': setNfText('');setNfStop(null);setNfSugs([]);setNfDeps(null);break;
      case 'startNav': setScreen('nav');break;
      case 'applyReroute':{
        setResults(data);setSelIdx(0);setAnchors({});
        savePlan({results:data,selIdx:0,date,mode,timeMin,margin,vehicle});
        break;}
      case 'exitNav': setScreen('results');break;
      case 'back': setScreen('plan');break;
      case 'backToResults': setScreen('results');break;
      case 'openTT': if(result?.ferries?.length>0){setSelectedFerry(data||0);setScreen('timetable');}break;
      case 'setFerry': setSelectedFerry(data);break;
      case 'tab': setScreen(data);break;
    }
  }

  const inner=h('div',{style:{width:'100%',height:'100%',overflow:'hidden',background:'var(--bg)',position:'relative',color:'var(--txt)',fontFamily:"'DM Sans',sans-serif"}},
    screen==='plan'&&h(PlanScreen,{from,to,via,fromText,toText,viaText,fromSugs,toSugs,viaSugs,showVia,date,mode,timeMin,margin,now,loading,error,recents,geoLoading,T,lang,theme,on}),
    screen==='results'&&result&&h(ResultsScreen,{results,selIdx,result,mode,margin,timeMin,shared,vehicle,T,theme,on}),
    screen==='timetable'&&result&&h(TimetableScreen,{result,selectedFerry,now,T,lang,theme,on}),
    screen==='nextferry'&&h(NextFerryScreen,{T,lang,now,nfText,nfSugs,nfStop,nfDeps,nfLoading,theme,on}),
    screen==='nav'&&result&&h(NavScreen,{R:result,now,margin,lang,T,on}),
    h(TabBar,{screen,hasResult:!!result,T,on})
  );

  // Full screen on phones; full-height centered column on iPad/PC
  return h('div',{style:{position:'fixed',inset:0,background:'var(--bg2)',display:'flex',justifyContent:'center'}},
    h('div',{style:{width:'100%',maxWidth:mobile?'100%':560,height:'100%',position:'relative',background:'var(--bg)',boxShadow:mobile?'none':'0 0 70px rgba(0,0,0,.65)'}},inner)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
